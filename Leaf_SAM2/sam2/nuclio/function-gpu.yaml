metadata:
  name: sam2-hiera-tiny-gpu
  namespace: cvat
  annotations:
    name: Segment Anything 2.1
    type: detector
    spec: |
      [
        { "id": 0, "name": "Spinacia", "type": "polygon" }
      ]

spec:
  description: segmentation with Segment-Anything 2.1 :gpu
  runtime: 'python:3.10'
  handler: main:handler
  eventTimeout: 300s
  env:
    - name: PYTHONPATH
      value: /opt/nuclio/sam2

  build:
    image: cvat.sam2.hiera_tiny:gpu
    baseImage: python:3.10-slim

    directives:
      preCopy:
        # set NVIDIA container runtime settings
        - kind: ENV
          value: NVIDIA_VISIBLE_DEVICES=all
        - kind: ENV
          value: NVIDIA_DRIVER_CAPABILITIES=compute,utility

        - kind: ENV
          value: DEBIAN_FRONTEND=noninteractive
        - kind: WORKDIR
          value: /opt/nuclio/sam2
        
        - kind: RUN
          value: |-
            apt-get update && apt-get -y install --no-install-recommends curl git libsm6 libxext6 && rm -rf /var/lib/apt/lists/* && \
            pip3 install --no-cache-dir scipy pyyaml scikit-image opencv-python-headless numpy && \
            pip3 install --no-cache-dir onnxruntime-gpu && rm -rf /root/.cache/pip

        - kind: RUN
          value: |-
            pip3 install gdown && \
            gdown https://drive.google.com/uc?id=1NaMcxktklbodwD9HZqnX90J5eTuZKLJC -O yolo1.onnx && \
            gdown https://drive.google.com/uc?id=1nEaFocZgtMq44RT8dpCvgLT7iqtSHKPD -O yolo2.onnx && \
            gdown https://drive.google.com/uc?id=1rJ-ySwAZC76kVLdBa5XJ4hd1_LufH9Nm -O sam2.1_hiera_tiny_encoder.onnx && \
            gdown https://drive.google.com/uc?id=1YJLAUhWOXbk4YNBe3tYNLxpRgC5LEI4x -O sam2.1_hiera_tiny_decoder.onnx && \
            pip3 uninstall -y gdown && rm -rf /root/.cache/pip

  triggers:
    myHttpTrigger:
      numWorkers: 1
      kind: 'http'
      workerAvailabilityTimeoutMilliseconds: 10000
      attributes:
        maxRequestBodySize: 33554432

  resources:
    limits:
      nvidia.com/gpu: 1

  platform:
    attributes:
      restartPolicy:
        name: always
        maximumRetryCount: 3
      mountMode: volume