metadata:
  name: pth-sam2-hiera-tiny-gpu
  namespace: cvat
  annotations:
    name: Segment Anything 2.1
    type: detector
    spec: |
      [
        { "id": 0, "name": "Spinacia", "type": "polygon" }
      ]

spec:
  description: segmentation with Segment-Anything 2.1:gpu
  runtime: 'python:3.10'
  handler: main:handler
  eventTimeout: 300s
  env:
    - name: PYTHONPATH
      value: /opt/nuclio/sam2

  build:
    image: cvat.pth.sam2.hiera_tiny:gpu
    baseImage: python:3.10-slim

    directives:
      preCopy:
        # set NVIDIA container runtime settings
        - kind: ENV
          value: NVIDIA_VISIBLE_DEVICES=all
        - kind: ENV
          value: NVIDIA_DRIVER_CAPABILITIES=compute,utility

        - kind: ENV
          value: DEBIAN_FRONTEND=noninteractive
        - kind: WORKDIR
          value: /opt/nuclio/sam2
        - kind: RUN
          value: |-
            apt-get update && apt-get -y install --no-install-recommends curl git libsm6 libxext6 && rm -rf /var/lib/apt/lists/* && \
            pip3 install --no-cache-dir scipy pyyaml hydra-core iopath scikit-image opencv-python-headless && \
            pip3 install --no-cache-dir torch torchvision && \
            pip3 install --no-cache-dir ultralytics --no-deps && \
            pip3 install --no-cache-dir git+https://github.com/facebookresearch/sam2.git --no-deps && rm -rf /root/.cache/pip

        - kind: RUN
          value: |-
            curl -L -o sam2.1_hiera_tiny.pt https://dl.fbaipublicfiles.com/segment_anything_2/092824/sam2.1_hiera_tiny.pt && \
            pip3 install gdown && gdown https://drive.google.com/uc?id=1S8U3RwDKYaD9aj1NwcwxRQnwcreMi5fc -O yolo1.pt && \
            gdown https://drive.google.com/uc?id=16NmthLiquKnm-LVlx8exPbHexwTadOUf -O yolo2.pt && \
            pip3 uninstall -y gdown && rm -rf /root/.cache/pip

  triggers:
    myHttpTrigger:
      numWorkers: 2
      kind: 'http'
      workerAvailabilityTimeoutMilliseconds: 10000
      attributes:
        maxRequestBodySize: 33554432

  resources:
    limits:
      nvidia.com/gpu: 1

  platform:
    attributes:
      restartPolicy:
        name: always
        maximumRetryCount: 3
      mountMode: volume